name: Scrape Official Matches

on:
  schedule:
    # Se ejecuta todos los días a las 05:00 UTC (7:00 AM CEST / 6:00 AM CET)
    - cron: '0 5 * * *'
  workflow_dispatch: # Permite ejecución manual desde GitHub Actions

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run unified match scraper
        run: npx tsx scripts/cron-scrape.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CLUB_NAME: "Rivas Club Hockey"
          FMP_CLUB_NAME: "CP RIVAS LAS LAGUNAS"
          RFEP_CLUB_NAME: "ADISS HOCKEY RIVAS"
          FEDERATION_LOOKAHEAD_DAYS: 14
          FEDERATION_CACHE_MINUTES: 60
